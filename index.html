<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fengze Wellness (HK) Limited</title>
  <meta name="description" content="Fengze Wellness (HK) Limited — premium herbal wellness products and global distributor opportunities." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <div>
        <div class="brand">Fengze Wellness</div>
        <div class="brand-sub">香港豐澤健康有限公司</div>
      </div>
      <nav>
        <a href="#home" data-i18n="nav.home"></a>
        <a href="#about" data-i18n="nav.about"></a>
        <a href="#product" data-i18n="nav.product"></a>
        <a href="#quality" data-i18n="nav.quality"></a>
        <a href="#distributor" data-i18n="nav.distributor"></a>
        <a href="#contact" data-i18n="nav.contact"></a>
      </nav>
      <div class="lang-switch">
        <button data-lang="en">EN</button>
        <button data-lang="zh">中文</button>
      </div>
    </div>
  </header>

  <main>
    <section id="home" class="hero">
      <div class="container hero-grid">
        <div>
          <span class="badge" data-i18n="hero.badge"></span>
          <h1 data-i18n="hero.title"></h1>
          <p class="hero-sub" data-i18n="hero.subtitle"></p>
          <div class="cta-row">
            <a class="btn primary" href="#distributor" data-i18n="hero.ctaPrimary"></a>
            <a class="btn secondary" href="#product" data-i18n="hero.ctaSecondary"></a>
          </div>
          <div class="mini-points">
            <span data-i18n="hero.point1"></span>
            <span data-i18n="hero.point2"></span>
            <span data-i18n="hero.point3"></span>
          </div>
        </div>
        <div class="hero-visual">
          <img class="hero-image" src="./assets/product-front.jpg" alt="Cynomorii Herba product packaging" />
          <div class="hero-card overlay-card">
            <h3 data-i18n="hero.cardTitle"></h3>
            <ul id="hero-card-list"></ul>
            <p class="note" data-i18n="hero.note"></p>
          </div>
        </div>
      </div>
    </section>

    <section id="about" class="section">
      <div class="container two-col">
        <div>
          <p class="eyebrow" data-i18n="about.eyebrow"></p>
          <h2 data-i18n="about.title"></h2>
          <p data-i18n="about.body1"></p>
          <p data-i18n="about.body2"></p>
        </div>
        <div class="card">
          <h3 data-i18n="about.highlightsTitle"></h3>
          <ul id="about-highlights"></ul>
        </div>
      </div>
    </section>

    <section id="product" class="section alt">
      <div class="container">
        <p class="eyebrow" data-i18n="product.eyebrow"></p>
        <h2 data-i18n="product.title"></h2>
        <p class="section-intro" data-i18n="product.intro"></p>
        <div class="grid-3">
          <div class="card"><h3 data-i18n="product.card1Title"></h3><p data-i18n="product.card1Body"></p></div>
          <div class="card"><h3 data-i18n="product.card2Title"></h3><p data-i18n="product.card2Body"></p></div>
          <div class="card"><h3 data-i18n="product.card3Title"></h3><p data-i18n="product.card3Body"></p></div>
        </div>
        <div class="split mt-32">
          <div class="card">
            <h3 data-i18n="product.featuresTitle"></h3>
            <ul id="product-features"></ul>
          </div>
          <div class="card warning-card">
            <h3 data-i18n="product.complianceTitle"></h3>
            <p data-i18n="product.complianceBody"></p>
            <ul id="product-compliance"></ul>
          </div>
        </div>
      </div>
    </section>

    <section id="quality" class="section">
      <div class="container">
        <p class="eyebrow" data-i18n="quality.eyebrow"></p>
        <h2 data-i18n="quality.title"></h2>
        <p class="section-intro" data-i18n="quality.intro"></p>
        <div class="grid-3">
          <div class="card"><h3 data-i18n="quality.q1Title"></h3><p data-i18n="quality.q1Body"></p></div>
          <div class="card"><h3 data-i18n="quality.q2Title"></h3><p data-i18n="quality.q2Body"></p></div>
          <div class="card"><h3 data-i18n="quality.q3Title"></h3><p data-i18n="quality.q3Body"></p></div>
        </div>
        <div class="split mt-32">
          <div class="card">
            <h3 data-i18n="quality.downloadTitle"></h3>
            <p data-i18n="quality.downloadBody"></p>
            <a class="btn secondary" href="./public/Cynomorii-Herba-Pills-ASH24-0033163-01.pdf" target="_blank" rel="noreferrer" data-i18n="quality.downloadCta"></a>
          </div>
          <div class="card image-card">
            <img src="./assets/product-packaging.jpg" alt="Product packaging" class="section-image" />
          </div>
        </div>
      </div>
    </section>

    <section id="distributor" class="section alt">
      <div class="container two-col">
        <div>
          <p class="eyebrow" data-i18n="distributor.eyebrow"></p>
          <h2 data-i18n="distributor.title"></h2>
          <p data-i18n="distributor.body"></p>
          <ul id="distributor-points"></ul>
        </div>
        <div class="card">
          <h3 data-i18n="distributor.formTitle"></h3>
          <p data-i18n="distributor.formBody"></p>
          <div class="contact-box">
            <div><strong>Email:</strong> <a href="mailto:pityhappy@gmail.com">pityhappy@gmail.com</a></div>
            <div><strong>WhatsApp:</strong> <a href="https://wa.me/85251758291" target="_blank" rel="noreferrer">+852 5175 8291</a></div>
          </div>
        </div>
      </div>
    </section>

    <section id="contact" class="section">
      <div class="container two-col">
        <div>
          <p class="eyebrow" data-i18n="contact.eyebrow"></p>
          <h2 data-i18n="contact.title"></h2>
          <p data-i18n="contact.body"></p>
        </div>
        <div class="card">
          <div class="info-line"><strong>Email</strong><span>pityhappy@gmail.com</span></div>
          <div class="info-line"><strong>WhatsApp</strong><span>+852 5175 8291</span></div>
          <div class="info-line"><strong data-i18n="contact.addressLabel"></strong><span>ROOM 1006, 10/F., Po Yip Building, 23 Hing Yip Street</span></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <div>© <span id="year"></span> Fengze Wellness (HK) Limited</div>
      <div class="footer-note" data-i18n="footer.note"></div>
    </div>
  </footer>

  <script src="./site.js"></script>
</body>
</html>
